<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prison.Pics | BrakkaDoemChain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        hacker: '#00FF41',
                        alert: '#FF0033',
                        darkBg: '#0D0D0D',
                        panel: '#1A1A1A'
                    },
                    fontFamily: {
                        mono: ['"Courier New"', 'Courier', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    animation: {
                        'scanline': 'scanline 8s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #E5E7EB; }
        .glitch-text { text-shadow: 2px 0 red, -2px 0 cyan; }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.4;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="font-sans antialiased relative min-h-screen flex flex-col">
    <div class="crt-overlay"></div>
    <div class="fixed inset-0 pointer-events-none z-40 overflow-hidden">
        <div class="w-full h-4 bg-hacker/10 opacity-50 animate-scanline"></div>
    </div>

    <nav class="border-b border-gray-800 bg-darkBg/90 backdrop-blur-sm sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i data-lucide="cctv" class="text-hacker w-6 h-6"></i>
                    <span class="font-mono font-bold text-xl tracking-tighter text-white">Prison<span class="text-hacker">.Pics</span></span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-6 font-mono text-sm">
                        <a href="#chatcam" class="text-gray-300 hover:text-hacker transition-colors">./Chatcam</a>
                        <a href="https://github.com/BrakkaDoemChain/prison-pics/tree/main/logs" target="_blank" class="text-gray-300 hover:text-hacker transition-colors">./Archives</a>
                        <span class="text-gray-600 line-through cursor-not-allowed flex items-center gap-2">
                            ./Captains.Rest <i data-lucide="lock" class="w-3 h-3"></i>
                        </span>
                        <a href="https://github.com/BrakkaDoemChain/prison-pics" target="_blank" class="text-gray-300 hover:text-white transition-colors flex items-center gap-2">
                            <i data-lucide="github" class="w-4 h-4"></i> Repo
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex flex-col gap-12">
        <header class="flex flex-col items-center text-center mt-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-alert/50 bg-alert/10 text-alert font-mono text-xs mb-6 animate-pulse-slow">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                NODE OFFLINE: LENS SHATTERED • 21-06-2026
            </div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-4 uppercase">
                Ongeziene <span class="glitch-text text-white">Realiteiten</span>
            </h1>
        </header>

        <!-- System Update -->
        <section class="bg-panel border-l-4 border-hacker p-6 rounded-r-lg shadow-2xl">
            <h2 class="text-xl font-bold mb-3 flex items-center gap-2 text-white">
                <i data-lucide="git-pull-request" class="w-5 h-5 text-hacker"></i> System Update + Latest Log
            </h2>
            <p class="text-gray-400">Priority Alpha: Prison.Pics first.</p>
            <p class="border-l-4 border-yellow-500 pl-4 italic mt-4">
                <strong>21-06-2026:</strong> Fathers day from HQ Hoorn GGZ prison. Gemini Phone died...
            </p>
        </section>

        <!-- Video Transmissions -->
        <section class="bg-[#0a0a0a] border border-gray-800 rounded-lg p-6 space-y-8">
            <h3 class="text-hacker font-mono mb-4 flex items-center gap-2">
                <i data-lucide="play" class="w-5 h-5"></i> LATEST TRANSMISSIONS
            </h3>
            
            <!-- First Video -->
            <div>
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/Ap_i8zkBMBU" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Second Video -->
            <div>
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/ih_9tVBbIiU" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
